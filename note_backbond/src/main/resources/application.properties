# ===========================
# Server Config
# ===========================
server.port=8080

# ===========================
# MySQL DataSource Config
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/note_backbond?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
